name: Deploy Customer Loyalty Agent

on:
  push:
    branches:
      - main
    paths:
      - 'src/app/agents/customerLoyaltyAgent_initializer.py'
      - 'src/prompts/CustomerLoyaltyAgentPrompt.txt'
      - 'src/app/tools/discountLogic.py'
  workflow_dispatch:

permissions:
  id-token: write   # Required for Azure OIDC login
  contents: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  deploy-loyalty-agent:
    name: Initialize Customer Loyalty Agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install azure-ai-projects \
                      azure-identity \
                      python-dotenv \
                      pandas \
                      openai \
                      opentelemetry-api \
                      azure-monitor-opentelemetry \
                      azure-ai-agents \
                      opentelemetry-instrumentation-openai-v2

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Customer Loyalty Agent Initializer
        env:
          FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
          gpt_deployment: ${{ secrets.GPT_DEPLOYMENT }}
          gpt_endpoint: ${{ secrets.GPT_ENDPOINT }}
          gpt_api_key: ${{ secrets.GPT_API_KEY }}
          gpt_api_version: ${{ secrets.GPT_API_VERSION }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          MCP_SERVER_URL: ${{ secrets.MCP_SERVER_URL }}
        run: |
          cd src
          python -m app.agents.customerLoyaltyAgent_initializer
