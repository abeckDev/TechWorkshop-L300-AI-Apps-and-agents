name: Build and Deploy to Azure Container Registry

on:
  push:
    branches:
      - main

env:
  # ── Configure these values ──────────────────────────────────
  # Set these as GitHub repository variables or replace with your values
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}   # e.g. myregistry.azurecr.io
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'techworkshop-ai-app' }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout the repository ───────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Log in to Azure Container Registry ────────────────
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ─── Write the ENV secret to a .env file ───────────────
      # The file is created inside src/ so the Dockerfile's
      # COPY .env .env picks it up.  The .gitignore already
      # excludes .env, so it can never be committed.
      - name: Create .env file from secret
        run: echo "${{ secrets.ENV }}" > src/.env

      # ─── Build and push the Docker image ───────────────────
      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            ./src

      - name: Push Docker image
        run: |
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
